name: dangq
description: "A new Flutter project."

publish_to: 'none'  # pub.dev에 배포하지 않도록 설정

version: 1.0.0+1

environment:
  sdk: ^3.7.2  # 사용하는 Dart SDK 버전 명시

dependencies:
  flutter:
    sdk: flutter  # Flutter SDK 의존성

  cupertino_icons: ^1.0.8  # iOS 스타일 아이콘
  http: ^1.3.0  # HTTP 요청 라이브러리
  flutter_dotenv: ^5.2.1  # .env 파일로 환경변수 관리
  flutter_naver_map: ^1.3.0+1  # 네이버 지도 연동
  location: ^8.0.0  # 위치 정보 가져오기
  permission_handler: ^11.4.0  # 권한 요청 및 관리
  shared_preferences: ^2.5.3  # 간단한 로컬 저장소
  geolocator: ^13.0.4  # 위치 기반 서비스
  sensors_plus: ^6.1.1  # 센서 정보
  table_calendar: ^3.2.0  # 캘린더 UI 위젯
  image_picker: ^1.1.2  # 이미지 선택 기능
  kpostal: ^1.1.0  # 도로명 주소 검색
  dio: ^5.8.0+1  # 강력한 HTTP 클라이언트
  device_info_plus: ^11.3.3  # 기기 정보 가져오기

dev_dependencies:
  flutter_test:
    sdk: flutter  # 테스트 프레임워크

  flutter_lints: ^5.0.0  # 코드 스타일 린트

flutter:
  uses-material-design: true  # 머티리얼 디자인 사용
  assets:
    - assets/.env  # 환경변수 파일 경로
    - assets/images/  # 이미지 파일 경로

geocoding: ^2.0.5